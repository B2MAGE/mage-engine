<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAGE API Test Harness</title>
<style>
body {
  margin: 0;
  min-height: 100vh;
  background: #0f0f0f;
  color: #e9e9e9;
  font-family: Arial, Helvetica, sans-serif;
}

.layout {
  display: grid;
  grid-template-columns: minmax(320px, 420px) 1fr;
  gap: 16px;
  padding: 16px;
}

.panel {
  background: #1a1a1a;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 12px;
}

.panel h2 {
  margin: 0 0 10px;
  font-size: 15px;
}

.group {
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px solid #2b2b2b;
}

.group:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

input, textarea, button {
  background: #0f0f0f;
  color: #e9e9e9;
  border: 1px solid #3b3b3b;
  border-radius: 6px;
  padding: 8px;
  font-size: 13px;
}

button {
  cursor: pointer;
}

button:hover {
  border-color: #606060;
}

input, textarea {
  width: 100%;
  box-sizing: border-box;
}

textarea {
  min-height: 120px;
  resize: vertical;
  font-family: Consolas, Monaco, monospace;
}

#log {
  min-height: 120px;
  max-height: 220px;
}

#mageWrap {
  display: grid;
  place-items: center;
}

#mage {
  width: min(960px, 92vw);
  aspect-ratio: 16 / 9;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
}

#mage canvas {
  width: 100%;
  height: 100%;
  display: block;
}

@media (max-width: 980px) {
  .layout {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
  <div class="layout">
    <div class="panel">
      <h2>MAGE Engine API Test</h2>

      <div class="group">
        <strong>Playback</strong>
        <div class="row">
          <button id="btnStart">start()</button>
          <button id="btnPlay">play()</button>
          <button id="btnPause">pause()</button>
        </div>
      </div>

      <div class="group">
        <strong>Audio</strong>
        <input id="audioUrl" placeholder="Audio URL (optional)" />
        <div class="row">
          <button id="btnLoadAudioUrl">loadAudio(url)</button>
          <button id="btnLoadAudioFile">loadAudio() file picker</button>
        </div>
      </div>

      <div class="group">
        <strong>Preset</strong>
        <textarea id="presetInput" placeholder='Paste preset JSON for loadPreset(...)'></textarea>
        <div class="row">
          <button id="btnLoadPreset">loadPreset(json)</button>
          <button id="btnExportPreset">toPreset()</button>
        </div>
      </div>

      <div class="group">
        <strong>Quick Preset Builder</strong>
        <input id="presetId" type="number" min="0" value="0" placeholder="Preset ID" />
        <textarea id="shaderCode" placeholder="Optional shader code (leave blank for current/default)"></textarea>
        <div class="row">
          <button id="btnApplyQuickPreset">Apply preset skybox</button>
          <button id="btnFillSample">Fill sample JSON</button>
        </div>
      </div>

      <div class="group">
        <strong>Logs</strong>
        <textarea id="log" readonly></textarea>
      </div>
    </div>

    <div id="mageWrap">
      <div id="mage"></div>
    </div>
  </div>

  <input type="file" id="file" style="display:none;" />

  <script type = "module">
    import { initMAGE } from "./js/mage-lib.js";
    window.addEventListener('load', () => {
        const logEl = document.getElementById('log');
        const log = message => {
        const line = `[${new Date().toLocaleTimeString()}] ${message}`;
        logEl.value = `${line}\n${logEl.value}`;
        };

        const container = document.getElementById('mage');
        const canvas = document.createElement('canvas');
        container.appendChild(canvas);

        const { engine } = initMAGE({
            canvas,
            withControls: true,
            autoStart: true,
        });

        document.getElementById('btnStart').addEventListener('click', () => {
        engine.start();
        log('start() called');
        });

        document.getElementById('btnPlay').addEventListener('click', () => {
        engine.play();
        log('play() called');
        });

        document.getElementById('btnPause').addEventListener('click', () => {
        engine.pause();
        log('pause() called');
        });

        document.getElementById('btnLoadAudioUrl').addEventListener('click', () => {
        const url = document.getElementById('audioUrl').value.trim();
        engine.loadAudio(url || undefined);
        log(url ? `loadAudio(url): ${url}` : 'loadAudio() with no URL');
        });

        document.getElementById('btnLoadAudioFile').addEventListener('click', () => {
        engine.loadAudio();
        log('loadAudio() file picker opened');
        });

        document.getElementById('btnLoadPreset').addEventListener('click', () => {
        const text = document.getElementById('presetInput').value.trim();
        if (!text) {
            log('No preset JSON provided');
            return;
        }

        try {
            engine.loadPreset(text);
            log('loadPreset(json) called');
        } catch (error) {
            log(`loadPreset failed: ${error.message}`);
        }
        });

        document.getElementById('btnExportPreset').addEventListener('click', () => {
        const preset = engine.toPreset({ includeState: true });
        const json = JSON.stringify(preset, null, 2);
        document.getElementById('presetInput').value = json;
        log('toPreset({ includeState: true }) called');
        });

        document.getElementById('btnApplyQuickPreset').addEventListener('click', () => {
            const presetId = Number.parseInt(document.getElementById('presetId').value, 10) || 0;
            const shaderText = document.getElementById('shaderCode').value.trim();

            const payload = {
                visualizer: {
                skybox: { type: 'preset', presetId },
                },
            };

            if (shaderText) {
                payload.visualizer.shader = shaderText;
            }

            engine.loadPreset(payload);
            log(`Quick preset applied (presetId=${presetId})`);
        });

        log('Engine initialized. API test harness ready.');
    });
  </script>
</body>
</html>
